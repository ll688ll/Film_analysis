services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filmuser
      POSTGRES_PASSWORD: filmpass
      POSTGRES_DB: filmanalysis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmuser -d filmanalysis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://filmuser:filmpass@db:5432/filmanalysis
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
